<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaste planten – Themazoeker</title>

  <link rel="stylesheet" href="style.css?v=3">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 10px;
      background: #f4f4f4;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    .search-wrapper {
      position: relative;
      margin-bottom: 10px;
    }

    #searchBox {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    #clearBtn {
      position: absolute;
      right: 10px;
      top: 12px;
      cursor: pointer;
      display: none;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .theme {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 8px;
      background: #ddd;
      font-size: 14px;
    }

    button {
      padding: 8px 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
      background: #356859;
      color: white;
      cursor: pointer;
    }

    /* 🔥 LIGHTBOX */
    #lightbox {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }

    #lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>🌿 Vaste planten – Themazoeker 👀</h1>
  <p>Zoek op 🇳🇱 Nederlandse of Latijnse naam</p>
</header>

<main>

  <div class="search-wrapper">
    <input id="searchBox" type="text" placeholder="Zoek plant..." autocomplete="off">
    <span id="clearBtn">✖</span>
  </div>

  <div id="results"></div>

</main>

<!-- 🔥 LIGHTBOX -->
<div id="lightbox">
  <img id="lightboxImg">
</div>

<script src="script.js?v=3"></script>

</body>
</html>
