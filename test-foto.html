<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Foto test</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
}

.card {
  border: 1px solid #ccc;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}

img {
  max-width: 200px;
  margin-top: 10px;
  display: block;
}
</style>
</head>

<body>

<h2>Test foto's via JSON (Excel gestuurd)</h2>

<div id="output">Laden...</div>

<script>

const FALLBACK = "https://webshop.griffioenwassenaar.nl/img/plant.png";

// 🔥 JSON laden zonder cache
fetch("/hello-garden-themaviewer/data.json?v=" + Date.now(), {
  cache: "no-store"
})
.then(res => res.json())
.then(data => {

  console.log("DATA:", data);

  const testData = data.slice(0, 40);

  document.getElementById("output").innerHTML = testData.map(item => {

    const imgUrl = item["Foto"] || FALLBACK;

    return `
      <div class="card">
        <strong>${item["Nederlandse naam"]}</strong><br>
        ${item["Omschrijving"]}<br>
        Barcode: ${item["Barcode"]}<br>

        <img src="${imgUrl}"
             onerror="this.onerror=null; this.src='${FALLBACK}'; this.style.border='3px solid red';">

        <div style="font-size:12px;color:gray;word-break:break-all;">
          ${imgUrl}
        </div>
      </div>
    `;

  }).join("");

})
.catch(err => {
  document.getElementById("output").innerHTML = "FOUT: " + err;
  console.error(err);
});

</script>

</body>
</html>
