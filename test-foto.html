<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Foto test v2</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
}

.card {
  border: 1px solid #ccc;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}

img {
  max-width: 200px;
  margin-top: 10px;
  display: block;
}
</style>
</head>

<body>

<h2>Test foto's via barcode</h2>

<div id="output">Laden...</div>

<script>

const BASE_URL = "https://s3-eu-west-1.amazonaws.com/griffioen-portal/";

// 🔥 juiste pad voor GitHub Pages
fetch("/hello-garden-themaviewer/data.json?nocache=" + Date.now())
  .then(res => res.json())
  .then(data => {

    console.log("DATA:", data);

    const testData = data.slice(0, 40);

    document.getElementById("output").innerHTML = testData.map(item => {

      const barcode = item["Barcode"];

      // 🔥 schone naam maken
      const cleanName = (item["Omschrijving"] || "")
        .replace(/[^a-zA-Z0-9]/g, "");

      // 🔥 URL bouwen
      const imgUrl = BASE_URL + cleanName + "POTGOLF" + barcode + ".jpg";

      console.log("IMG URL:", imgUrl);

      return `
        <div class="card">
          <strong>${item["Nederlandse naam"]}</strong><br>
          ${item["Omschrijving"]}<br>
          Barcode: ${barcode}<br>

          <img src="${imgUrl}"
               style="max-width:150px"
               onerror="this.onerror=null; this.style.border='3px solid red'; this.src='';">

          <div style="font-size:12px;color:gray;word-break:break-all;">
            ${imgUrl}
          </div>
        </div>
      `;

    }).join("");

  })
  .catch(err => {
    document.getElementById("output").innerHTML = "FOUT: " + err;
    console.error(err);
  });

</script>
